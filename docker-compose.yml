version: '3.8'

services:
  app:
    build: .
    container_name: tppe-advocacia-frontend
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  dev:
    image: node:20-alpine
    container_name: tppe-advocacia-frontend-dev
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - '5173:5173'
    environment:
      - NODE_ENV=development
    command: sh -c "npm install && npm run dev"
    restart: unless-stopped
